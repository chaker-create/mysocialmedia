version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: jawna-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jawna-tn

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jawna-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/jawna-tn
      JWT_SECRET: jawna_tn_prod_secret_change_me
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jawna-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
